<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>エンジェラサバイバーズ</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1410">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="エンジェラ">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>
<canvas id="minimap" width="120" height="90"></canvas>
<button id="mute-btn" aria-label="サウンド切替">🔊</button>

<!-- 仮想スティック -->
<div id="joystick-zone">
  <div id="joystick-base">
    <div id="joystick-knob"></div>
  </div>
</div>

<!-- タイトル画面 -->
<div id="title" class="overlay active">
  <h1>エンジェラサバイバーズ</h1>
  <p>魔女エンジェラの生存サバイバル</p>
  <p>WASD / 矢印キー で移動 ・ 攻撃は自動</p>
  <div id="highscore-display"></div>
  <div id="mode-select">
    <button id="startBtnEasy" class="mode-btn mode-easy">イージー (10分)</button>
    <button id="startBtn" class="mode-btn mode-normal">ノーマル (30分)</button>
  </div>
</div>

<!-- ゲームオーバー画面 -->
<div id="gameover" class="overlay">
  <h2>― 魔女は倒れた ―</h2>
  <p id="go-time"></p>
  <p id="go-kills"></p>
  <p id="go-level"></p>
  <p id="go-highscore" style="color:#ffe79b;font-size:16px;margin-top:8px;"></p>
  <button onclick="restart()">もう一度挑む</button>
</div>

<!-- ステージクリア画面 -->
<div id="stage-clear" class="overlay">
  <h2 id="stage-clear-title" style="font-size:2em;color:#ffe79b;margin-bottom:16px">ステージ1 クリア!</h2>
  <p id="stage-clear-sub" style="margin-bottom:24px">次のステージへ進みます</p>
  <button onclick="nextStage()" style="padding:12px 32px;font-size:1.1em;cursor:pointer;
    background:#4ecc90;border:none;border-radius:8px;color:#000;font-weight:bold">
    次のステージへ ▶
  </button>
</div>

<!-- クリア画面 -->
<div id="clear" class="overlay">
  <h2>― 生き延びた! ―</h2>
  <p id="cl-time"></p>
  <p id="cl-kills"></p>
  <p id="cl-level"></p>
  <p id="cl-highscore" style="color:#ffe79b;font-size:16px;margin-top:8px;"></p>
  <button onclick="restart()">再挑戦</button>
</div>

<!-- レベルアップ画面 -->
<div id="levelup" class="overlay">
  <h2>レベルアップ!</h2>
  <p>授かる力を選べ</p>
  <div class="cards" id="cards"></div>
</div>

<div id="hint">WASD / 矢印キー で移動 ・ 攻撃は自動</div>

<script src="game.js"></script>
</body>
</html>
